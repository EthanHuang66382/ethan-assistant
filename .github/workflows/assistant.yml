name: Ethan Assistant

on:
  workflow_dispatch:
  schedule:
    # 每 5 小时自动重启（GitHub Actions 最长 6 小时）
    # UTC 01:00, 06:00, 11:00, 16:00, 21:00
    - cron: '0 1,6,11,16,21 * * *'

concurrency:
  group: ethan-assistant
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  assistant:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~5.8 小时，留一点余量

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lark-cli
        run: npm install -g @larksuite/cli@1

      - name: Configure lark-cli
        run: echo "${{ secrets.LARK_APP_SECRET }}" | lark-cli config init --app-id "${{ secrets.LARK_APP_ID }}" --app-secret-stdin --brand lark

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Ethan Assistant
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: us-east-1
          BEDROCK_MODEL_ID: us.anthropic.claude-sonnet-4-20250514-v1:0
          BOT_OPEN_ID: ${{ secrets.BOT_OPEN_ID }}
          OPEN_ID_ETHAN: ${{ secrets.OPEN_ID_ETHAN }}
          OPEN_ID_AARON: ${{ secrets.OPEN_ID_AARON }}
          OPEN_ID_JACKSON: ${{ secrets.OPEN_ID_JACKSON }}
          OPEN_ID_ALVIN: ${{ secrets.OPEN_ID_ALVIN }}
          OPEN_ID_THOMAS: ${{ secrets.OPEN_ID_THOMAS }}
          OPEN_ID_DERIC: ${{ secrets.OPEN_ID_DERIC }}
          RELAY_CHAT_ID: ${{ secrets.RELAY_CHAT_ID }}
        run: python3 assistant.py

      - name: Persist token usage
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          touch token_usage.jsonl
          git pull --rebase --autostash origin main
          git add token_usage.jsonl
          if ! git diff --cached --quiet; then
            git commit -m "Update token usage"
            git push
          else
            echo "No token usage changes to persist"
          fi
